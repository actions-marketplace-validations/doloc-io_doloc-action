name: Translate Flutter ARB files

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  translate-flutter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: doloc-io/doloc-action@v1
        with:
          token: ${{ secrets.DOLOC_API_TOKEN }}
          source: lib/l10n/app_en.arb
          targets: |
            lib/l10n/app_de.arb:de
